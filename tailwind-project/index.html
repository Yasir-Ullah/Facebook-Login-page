<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/path/to/favicon.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="icon"
      type="image/x-icon"
      href="./facebook-logo-icon_705838-12833.avif"
    />
    <title>Facebook SinUp Page</title>
  </head>
  <body class="bg-gray-100">
    <div class="container mt-20 flex mx-auto item-center justify-center">
      <div class="left w-1/2 mx-14 mt-20">
        <img class="w-80" src="./face.svg.svg" alt="" />
        <p class="text-3xl mx-6">
          Facebook helps you connect and share with the people in your life.
        </p>
      </div>
      <div
        class="Right flex flex-col bg-white w-1/3 h-45 p-4 rounded-xl text-lg relative"
      >
        <input
          class="px-4 my-2 h-12 border border-1 border-gry-200 outline-blue-400 rounded-lg"
          type="text"
          name=""
          id=""
          placeholder="Email Address or Phone number "
        />
        <input
          class="px-4 my-2 h-12 border border-1 border-gry-200 outline-blue-400 rounded-lg"
          type="password"
          name=""
          id=""
          placeholder="Password"
        />
        <button
          class="btn bg-blue-600 hover:bg-blue-700 text-white my-2 py-3 rounded-md font-bold"
        >
          Log in
        </button>
        <span
          class="text-center text-blue-400 my-2 cursor-pointer hover:underline"
          >Forgotten password?</span
        >
        <hr class="my-2" />
        <button
          class="btn bg-green-600 hover:bg-green-700 text-white my-2 py-3 rounded-md font-bold px-4 mx-auto w-fit"
        >
          Creat new account
        </button>
        <span class="absolute -bottom-12 text-sm">
          <span class="hover:underline font-bold cursor-pointer"
            >Create a Page</span
          >
          font-bold for a celebrity, brand or business</span
        >
      </div>
    </div>
  </body>
</html>
